<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Buffaloes — Restaurant & Bar Menu</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
</head>
<body>

<!-- LANDING PAGE -->
<div id="landing">
  <div class="logo-wrap">
    <div class="logo-title">BUFFALOES</div>
    <div class="logo-sub">Komamboga Waligo Road</div>
    
  </div>

  <div class="divider"></div>
  <p class="menu-prompt">SELECT YOUR MENU</p>

  <div class="menu-buttons">
    <div class="menu-btn" onclick="showSection('food')">
      <div>
        <div class="btn-label">FOOD</div>
        <div class="btn-desc">STARTERS · MAINS · SPECIALS · PIZZA</div>
      </div>
      <span class="btn-arrow">→</span>
    </div>
    <div class="menu-btn" onclick="showSection('drinks')">
      <div>
        <div class="btn-label">DRINKS</div>
        <div class="btn-desc">COFFEE · TEA · MOCKTAILS · JUICES</div>
      </div>
      <span class="btn-arrow">→</span>
    </div>
    <div class="menu-btn" onclick="showSection('bar')">
      <div>
        <div class="btn-label">BAR</div>
        <div class="btn-desc">SPIRITS · WINE · COCKTAILS · CHAMPAGNE</div>
      </div>
      <span class="btn-arrow">→</span>
    </div>
  </div>

  <div class="contact-bar">
    <div class="divider" style="margin-bottom:16px"></div>
    <p><a href="tel:0759933555">0759 933 555</a> — Komamboga Waligo Road</p>
  </div>
</div>

<!-- DYNAMIC MENU VIEW -->
<div id="section-view">
  <div class="section-header">
    <button class="back-btn" onclick="goBack()">← BACK</button>
    <div class="section-title-bar" id="section-title-bar"></div>
  </div>
  <div class="section-content" id="section-content"></div>
</div>

<script src="script.js"></script>
</body>
</html>
